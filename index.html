<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/png" href="/logo.png" />
  <title>Spectr Trading | Neuro-Finance Intelligence</title>

  <script>
    // Emergency Chunk Load Error Handler
    window.addEventListener('error', function(e) {
      const errorText = e.message || '';
      if (errorText.includes('Loading chunk') || errorText.includes('Failed to fetch dynamically imported module')) {
        console.warn('Chunk load failed, forcing reload to fetch latest build...');
        window.location.reload(true);
      }
    }, true);
  </script>

  <!-- Primary Meta Tags -->
  <meta name="title" content="Spectr Trading | Neural Tactical Terminal" />
  <meta name="description"
    content="Next-generation tactical terminal for crypto traders. Featuring Neural Signals, Whale Radar, and institutional-grade analytics." />
  
  <!-- PWA: Mobile optimization -->
  <meta name="theme-color" content="#030308" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Spectr">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">

  <!-- Telegram Web App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<style>
  :root {
    --bg-load: #030308;
    --accent-load: #00FFFF;
    --accent2: #4F46E5;
  }
  body {
    background-color: var(--bg-load);
    margin: 0; padding: 0;
    overscroll-behavior-y: none;
  }
  @keyframes s-pulse {
    0%, 100% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 20px rgba(0,255,255,0.2); }
    50%      { transform: scale(1.1); opacity: 1; box-shadow: 0 0 40px rgba(0,255,255,0.4); }
  }
  @keyframes orbit1  { to { transform: rotate(360deg); } }
  @keyframes orbit2  { from { transform: rotate(120deg); } to { transform: rotate(480deg); } }
  @keyframes orbit3  { from { transform: rotate(240deg); } to { transform: rotate(600deg); } }
  @keyframes logo-breathe {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(0,255,255,0.15)); }
    50%      { transform: scale(1.05); filter: drop-shadow(0 0 40px rgba(0,255,255,0.35)); }
  }
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes bar-sweep {
    0%   { transform: translateX(-100%); }
    50%  { transform: translateX(0%); }
    100% { transform: translateX(200%); }
  }
  @keyframes shimmer {
    from { background-position: -200% 0; }
    to   { background-position: 200% 0; }
  }
  @keyframes grid-scroll { to { transform: translateY(40px); } }
  @keyframes dot-pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40%           { opacity: 1; transform: scale(1.2); }
  }

  .sp-grid {
    position: absolute; inset: 0; overflow: hidden; pointer-events: none;
    background-image:
      linear-gradient(rgba(0,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: grid-scroll 4s linear infinite;
    mask-image: radial-gradient(ellipse 60% 50% at 50% 50%, black 20%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse 60% 50% at 50% 50%, black 20%, transparent 70%);
  }
  .sp-vig {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 30%, var(--bg-load) 75%);
  }
  .sp-logo {
    position: relative; width: 96px; height: 96px;
    animation: logo-breathe 3s ease-in-out infinite;
    margin-bottom: 36px;
  }
  .sp-core {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0a0a12, #0d0d18);
    border: 1.5px solid rgba(0,255,255,0.2);
    border-radius: 26px; font-family: 'Inter', sans-serif;
    font-weight: 900; font-size: 40px; color: var(--accent-load); z-index: 2;
    box-shadow: 0 0 30px rgba(0,255,255,0.08), inset 0 0 20px rgba(0,255,255,0.04);
  }
  .sp-r { position: absolute; border-radius: 50%; border: 1px solid transparent; }
  .sp-r1 { inset: -14px; border-color: rgba(0,255,255,0.12) transparent rgba(0,255,255,0.12) transparent; animation: orbit1 6s linear infinite; }
  .sp-r2 { inset: -26px; border-color: transparent rgba(79,70,229,0.1) transparent rgba(79,70,229,0.1); animation: orbit2 8s linear infinite; }
  .sp-r3 { inset: -38px; border-color: rgba(0,255,255,0.06) transparent transparent transparent; animation: orbit3 12s linear infinite; }
  .sp-r1::after { content:''; position: absolute; top: -2px; left: 50%; width: 5px; height: 5px; border-radius: 50%; background: var(--accent-load); box-shadow: 0 0 8px var(--accent-load); }
  .sp-r2::after { content:''; position: absolute; bottom: -2px; right: 20%; width: 4px; height: 4px; border-radius: 50%; background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }

  .sp-title { font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 900; letter-spacing: 0.5em; text-transform: uppercase; color: #fff; margin: 0; animation: fade-up .8s ease-out .2s both; }
  .sp-sub {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600;
    letter-spacing: 0.15em; text-transform: uppercase; margin: 10px 0 0;
    background: linear-gradient(90deg, var(--accent-load), var(--accent2), var(--accent-load));
    background-size: 200% 100%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    animation: fade-up .8s ease-out .4s both, shimmer 3s linear infinite;
  }
  .sp-bar { width: 160px; height: 2px; margin-top: 40px; background: rgba(255,255,255,0.04); border-radius: 2px; overflow: hidden; animation: fade-up .8s ease-out .6s both; }
  .sp-fill { width: 50%; height: 100%; background: linear-gradient(90deg, var(--accent-load), var(--accent2)); border-radius: 2px; animation: bar-sweep 2.5s cubic-bezier(.4,0,.2,1) infinite; }

  .sp-stat {
    position: absolute; bottom: 40px; display: flex; align-items: center; gap: 6px;
    font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 500;
    color: rgba(255,255,255,0.25); letter-spacing: 0.08em; text-transform: uppercase;
    animation: fade-up .8s ease-out .8s both;
  }
  .sp-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent-load); }
  .sp-dot:nth-child(1) { animation: dot-pulse 1.4s ease-in-out infinite; }
  .sp-dot:nth-child(2) { animation: dot-pulse 1.4s ease-in-out .2s infinite; }
  .sp-dot:nth-child(3) { animation: dot-pulse 1.4s ease-in-out .4s infinite; }
</style>

<div id="root">
  <div style="height:100vh;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg-load);color:#fff;font-family:'Inter',sans-serif;position:relative;overflow:hidden;">
    <div class="sp-grid"></div>
    <div class="sp-vig"></div>

    <div class="sp-logo">
      <div class="sp-r sp-r3"></div>
      <div class="sp-r sp-r2"></div>
      <div class="sp-r sp-r1"></div>
      <div class="sp-core">S</div>
    </div>

    <div style="text-align:center;position:relative;">
      <h1 class="sp-title">SPECTR</h1>
      <p class="sp-sub">Neural Trading Terminal</p>
    </div>

    <div class="sp-bar"><div class="sp-fill"></div></div>

    <div class="sp-stat">
      <span class="sp-dot"></span>
      <span class="sp-dot"></span>
      <span class="sp-dot"></span>
      <span style="margin-left:4px;">Initializing Consensus Engine</span>
    </div>
  </div>
</div>
<script type="module" src="/src/main.jsx"></script>
</body>

</html>
