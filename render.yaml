services:
  # --- API (Node/Express) ---
  - type: web
    name: spectr-api
    runtime: node
    plan: starter
    region: oregon
    repo: https://github.com/your/repo.git
    buildCommand: |
      npm ci
      npx prisma generate
      npx prisma db push --accept-data-loss
    startCommand: |
      node server/index.js
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: FRONTEND_URL
        fromService:
          type: web
          name: spectr-web
          property: host
      - key: N8N_SECRET
        generateValue: true

  # --- Frontend (Vite React, статика) ---
  - type: web
    name: spectr-web
    runtime: static
    plan: starter
    repo: https://github.com/your/repo.git
    buildCommand: |
      npm ci
      npm run build
    staticPublishPath: dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_HOST
        fromService:
          type: web
          name: spectr-api
          property: host
