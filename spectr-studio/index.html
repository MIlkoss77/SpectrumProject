<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectr Studio | Content Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Outfit:wght@400;700;900&display=swap"
        rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <aside class="controls">
            <div class="brand">
                <div class="logo-icon-main"
                    style="width: 38px; height: 38px; background: #0A0A0A; border-radius: 8px; overflow: hidden; margin-right: 8px; padding: 3px; display: inline-block; vertical-align: middle;">
                    <img class="logo-img-src" style="width: 100%; height: 100%; object-fit: contain; display: block;" alt="S">
                </div>
                <h2>Spectr Studio</h2>
            </div>

            <div class="control-group">
                <label>Brand Frame</label>
                <select id="frameSelect">
                    <option value="srmind">SPECTR MIND (EN)</option>
                    <option value="spectrmind-ru">SpectrMind.ru (RU)</option>
                </select>
            </div>

            <div class="control-group">
                <label>Design variation</label>
                <select id="designSelect">
                    <option value="template-classic">Classic News</option>
                    <option value="template-insight">Insight Quote</option>
                    <option value="template-minimal">Minimalist</option>
                    <option value="template-breaking">Breaking Alert</option>
                </select>
            </div>

            <div class="control-group">
                <label>Accent Color</label>
                <input type="color" id="accentColorInput" value="#00FFFF">
            </div>

            <div class="control-group">
                <label>Headline Font</label>
                <div style="display: flex; gap: 8px;">
                    <select id="fontFamilySelect" style="flex: 1;">
                        <option value="'Inter', sans-serif">Inter</option>
                        <option value="'Outfit', sans-serif">Outfit</option>
                    </select>
                    <select id="fontWeightSelect" style="flex: 1;">
                        <option value="400">Regular</option>
                        <option value="600">Semi Bold</option>
                        <option value="700">Bold</option>
                        <option value="800">Extra Bold</option>
                        <option value="900" selected>Black</option>
                    </select>
                </div>
            </div>

            <div class="control-group">
                <label>Headline Text</label>
                <textarea id="headlineInput"
                    placeholder="Enter news headline...">JPMORGAN ANALYSTS CAME UP WITH A LIST OF 19 STOCKS TO BE "AI-RESISTANT"</textarea>
            </div>

            <div class="control-group">
                <label>Background (Image / Video)</label>
                <input type="file" id="bgUpload" accept="image/*,video/mp4">
                <p class="hint">MP4 video or high quality image</p>
            </div>

            <div class="control-group">
                <label>Bubble Image (Optional)</label>
                <input type="file" id="bubbleUpload" accept="image/*">
            </div>

            <div class="control-group">
                <label>Text Size</label>
                <div class="slider-row">
                    <input type="range" id="fontSizeInput" min="40" max="150" value="80">
                    <span id="fontSizeVal">80px</span>
                </div>
            </div>

            <div class="control-group">
                <label>Line Spacing</label>
                <div class="slider-row">
                    <input type="range" id="lineHeightInput" min="0.8" max="1.5" step="0.05" value="1.05">
                    <span id="lineHeightVal">1.05</span>
                </div>
            </div>

            <div class="control-group">
                <label>Overlay Intensity</label>
                <div class="slider-row">
                    <input type="range" id="overlayInput" min="0" max="100" value="70">
                    <span id="overlayVal">70%</span>
                </div>
            </div>

            <div id="exportProgress" class="export-progress" style="display: none;">
                <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
                <span id="progressText" class="progress-text">0%</span>
            </div>

            <button id="exportBtn" class="primary-btn">Download 1080x1350</button>
            <p class="status">v2.0 Video + Dual Frame</p>
        </aside>

        <main class="preview-area">
            <div id="exportWrapper" class="export-wrapper">
                <div id="captureArea" class="post-template template-classic">
                    <div id="bgImage" class="bg-layer">
                        <video id="bgVideo" class="bg-video" loop muted playsinline></video>
                    </div>
                    <div id="gradientOverlay" class="gradient-overlay"></div>

                    <div class="top-nav">
                        <div class="nav-left">
                            <div class="brand-logo-main">
                                <div class="logo-icon-main"
                                    style="width: 42px; height: 42px; background: #0A0A0A; border-radius: 8px; overflow: hidden; margin-right: 4px; padding: 3px; display: inline-block; vertical-align: middle;">
                                    <img class="logo-img-src"
                                        style="width: 100%; height: 100%; object-fit: contain; display: block;" alt="S">
                                </div>
                                <span class="word-spectr" id="headerWordSpectr">SPECTR</span>
                                <span class="word-Mind" id="headerWordMind">MIND</span>
                            </div>
                            <span class="series" id="headerSeries">Daily Intelligence</span>
                        </div>
                    </div>

                    <div id="bubbleCircle" class="logo-bubble">
                        <div id="bubbleContent" class="bubble-inner">
                            <img id="bubbleImg" src="" style="display: none;">
                            <span id="bubblePlaceholderText">LOGO</span>
                        </div>
                    </div>

                    <div class="headline-container">
                        <h1 id="headlineDisplay">JPMORGAN ANALYSTS CAME UP WITH A LIST OF 19 STOCKS TO BE "AI-RESISTANT"
                        </h1>
                    </div>

                    <div class="bottom-brand">
                        <div class="brand-line"></div>
                        <div class="brand-logo-small">
                            <div class="logo-icon-main"
                                style="width: 42px; height: 42px; background: #0A0A0A; border-radius: 8px; overflow: hidden; margin-right: 4px; padding: 3px; display: inline-block; vertical-align: middle;">
                                <img class="logo-img-src" style="width: 100%; height: 100%; object-fit: contain; display: block;"
                                    alt="S">
                            </div>
                            <span class="word-spectr" id="footerWordSpectr">SPECTR</span>
                            <span class="word-Mind" id="footerWordMind">Mind</span>
                        </div>
                        <div class="brand-line"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const LOGO_BASE64 = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDgiIGhlaWdodD0iMTA4Ij48ZGVmcz48bGluZWFyR3JhZGllbnQgaWQ9ImciIHgxPSIwJSIgeTE9IjAlIiB4Mj0iMTAwJSIgeTI9IjEwMCUiPjxzdG9wIG9mZnNldD0iMCUiIHN0b3AtY29sb3I9IiMwMEZGRkYiLz48c3RvcCBvZmZzZXQ9IjEwMCUiIHN0b3AtY29sb3I9IiMwMEQ0RkYiLz48L2xpbmVhckdyYWRpZW50PjwvZGVmcz48cmVjdCB3aWR0aD0iMTA4IiBoZWlnaHQ9IjEwOCIgcng9IjIwIiBmaWxsPSIjMEEwQTBBIi8+PHRleHQgeD0iNTQiIHk9IjcyIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LWZhbWlseT0iSW50ZXIsIHNhbnMtc2VyaWYiIGZvbnQtd2VpZ2h0PSI5MDAiIGZvbnQtc2l6ZT0iNTAiIGZpbGw9InVybCgjZykiPk88L3RleHQ+PC9zdmc+";

        const headlineInput = document.getElementById('headlineInput');
        const headlineDisplay = document.getElementById('headlineDisplay');
        const bgUpload = document.getElementById('bgUpload');
        const bgImage = document.getElementById('bgImage');
        const bgVideo = document.getElementById('bgVideo');
        const bubbleUpload = document.getElementById('bubbleUpload');
        const bubbleCircle = document.getElementById('bubbleCircle');
        const bubbleImg = document.getElementById('bubbleImg');
        const bubblePlaceholderText = document.getElementById('bubblePlaceholderText');

        const fontSizeInput = document.getElementById('fontSizeInput');
        const fontSizeVal = document.getElementById('fontSizeVal');
        const lineHeightInput = document.getElementById('lineHeightInput');
        const lineHeightVal = document.getElementById('lineHeightVal');
        const overlayInput = document.getElementById('overlayInput');
        const overlayVal = document.getElementById('overlayVal');

        const accentColorInput = document.getElementById('accentColorInput');
        const designSelect = document.getElementById('designSelect');
        const fontFamilySelect = document.getElementById('fontFamilySelect');
        const fontWeightSelect = document.getElementById('fontWeightSelect');
        const frameSelect = document.getElementById('frameSelect');

        const gradientOverlay = document.getElementById('gradientOverlay');
        const exportBtn = document.getElementById('exportBtn');
        const captureArea = document.getElementById('captureArea');
        const exportProgress = document.getElementById('exportProgress');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');

        let currentBgType = 'none';

        function initLogos() {
            document.querySelectorAll('.logo-img-src').forEach(img => {
                img.src = LOGO_BASE64;
            });
        }
        initLogos();

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `${r}, ${g}, ${b}`;
        }

        accentColorInput.addEventListener('input', () => {
            const color = accentColorInput.value;
            const rgb = hexToRgb(color);
            document.documentElement.style.setProperty('--accent', color);
            document.documentElement.style.setProperty('--accent-rgb', rgb);
        });

        designSelect.addEventListener('change', () => {
            const templates = ['template-classic', 'template-insight', 'template-minimal', 'template-breaking'];
            templates.forEach(t => captureArea.classList.remove(t));
            captureArea.classList.add(designSelect.value);
        });

        fontFamilySelect.addEventListener('change', () => {
            headlineDisplay.style.fontFamily = fontFamilySelect.value;
        });

        fontWeightSelect.addEventListener('change', () => {
            headlineDisplay.style.fontWeight = fontWeightSelect.value;
        });

        headlineInput.addEventListener('input', () => {
            headlineDisplay.innerText = headlineInput.value.toUpperCase();
        });

        fontSizeInput.addEventListener('input', () => {
            headlineDisplay.style.fontSize = fontSizeInput.value + 'px';
            fontSizeVal.innerText = fontSizeInput.value + 'px';
        });

        lineHeightInput.addEventListener('input', () => {
            headlineDisplay.style.lineHeight = lineHeightInput.value;
            lineHeightVal.innerText = lineHeightInput.value;
        });

        overlayInput.addEventListener('input', () => {
            const val = overlayInput.value;
            gradientOverlay.style.background = `linear-gradient(to bottom, transparent 0%, rgba(0,0,0,${val / 100}) 100%)`;
            overlayVal.innerText = val + '%';
        });

        frameSelect.addEventListener('change', () => {
            const isRU = frameSelect.value === 'spectrmind-ru';
            if (isRU) {
                captureArea.classList.add('frame-ru');
                document.getElementById('headerWordSpectr').textContent = 'SpectrMind.ru';
                document.getElementById('headerWordMind').style.display = 'none';
                document.getElementById('headerSeries').textContent = '\u0415\u0436\u0435\u0434\u043d\u0435\u0432\u043d\u044b\u0439 \u0438\u043d\u0441\u0430\u0439\u0442';
                document.getElementById('footerWordSpectr').textContent = 'SpectrMind.ru';
                document.getElementById('footerWordMind').style.display = 'none';
            } else {
                captureArea.classList.remove('frame-ru');
                document.getElementById('headerWordSpectr').textContent = 'SPECTR';
                document.getElementById('headerWordMind').style.display = '';
                document.getElementById('headerSeries').textContent = 'Daily Intelligence';
                document.getElementById('footerWordSpectr').textContent = 'SPECTR';
                document.getElementById('footerWordMind').style.display = '';
            }
        });

        bgUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            if (file.type.startsWith('video/')) {
                reader.onload = (f) => {
                    bgVideo.src = f.target.result;
                    bgVideo.style.display = 'block';
                    bgVideo.play();
                    bgImage.style.backgroundImage = 'none';
                    currentBgType = 'video';
                };
                reader.readAsDataURL(file);
            } else {
                reader.onload = (f) => {
                    bgImage.style.backgroundImage = `url('${f.target.result}')`;
                    bgVideo.src = '';
                    bgVideo.style.display = 'none';
                    currentBgType = 'image';
                };
                reader.readAsDataURL(file);
            }
        });

        bubbleUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (f) => {
                    bubbleImg.src = f.target.result;
                    bubbleImg.style.display = 'block';
                    bubbleCircle.style.display = 'block';
                    bubblePlaceholderText.style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        });

        function exportImage() {
            exportBtn.innerText = "Processing...";
            exportBtn.disabled = true;
            const clone = captureArea.cloneNode(true);
            const rootStyle = getComputedStyle(document.documentElement);
            const accent = rootStyle.getPropertyValue('--accent');
            const accentRgb = rootStyle.getPropertyValue('--accent-rgb');
            Object.assign(clone.style, {
                position: 'fixed', top: '0', left: '200%',
                width: '1080px', height: '1350px', transform: 'none',
                visibility: 'visible', zIndex: '99999',
                '--accent': accent, '--accent-rgb': accentRgb
            });
            document.body.appendChild(clone);

            const bgElement = clone.querySelector('.bg-layer');
            if (currentBgType === 'image' && bgImage.style.backgroundImage) {
                bgElement.style.backgroundImage = bgImage.style.backgroundImage;
            }
            const cloneOverlay = clone.querySelector('.gradient-overlay');
            cloneOverlay.style.background = gradientOverlay.style.background;
            const cloneHeadline = clone.querySelector('#headlineDisplay');
            cloneHeadline.style.fontSize = headlineDisplay.style.fontSize;
            cloneHeadline.style.lineHeight = headlineDisplay.style.lineHeight;
            cloneHeadline.style.fontFamily = headlineDisplay.style.fontFamily || "'Inter', sans-serif";
            cloneHeadline.style.fontWeight = headlineDisplay.style.fontWeight || "900";
            clone.querySelectorAll('.logo-img-src').forEach((img) => { img.src = LOGO_BASE64; });

            const cloneBubbleCircle = clone.querySelector('#bubbleCircle');
            const cloneBubbleImg = clone.querySelector('#bubbleImg');
            if (bubbleImg.src && bubbleImg.style.display !== 'none') {
                cloneBubbleImg.src = bubbleImg.src;
                cloneBubbleImg.style.display = 'block';
                cloneBubbleCircle.style.display = 'block';
            } else {
                cloneBubbleCircle.style.display = 'none';
            }

            const h = clone.offsetHeight;
            setTimeout(() => {
                html2canvas(clone, {
                    scale: 2, useCORS: true, allowTaint: false,
                    backgroundColor: '#000', width: 1080, height: 1350
                }).then(canvas => {
                    try {
                        const link = document.createElement('a');
                        link.download = `spectr-${frameSelect.value}-${designSelect.value}-${Date.now()}.png`;
                        link.href = canvas.toDataURL('image/png', 1.0);
                        link.click();
                    } catch (e) {
                        console.error("toDataURL failed:", e);
                        alert("Security error: Could not save image.");
                    }
                    document.body.removeChild(clone);
                    exportBtn.innerText = "Download 1080x1350";
                    exportBtn.disabled = false;
                }).catch(err => {
                    console.error("Export Error:", err);
                    if (clone.parentNode) document.body.removeChild(clone);
                    alert("Export failed: " + err.message);
                    exportBtn.innerText = "Download 1080x1350";
                    exportBtn.disabled = false;
                });
            }, 300);
        }

        function exportVideo() {
            exportBtn.innerText = "Recording...";
            exportBtn.disabled = true;
            exportProgress.style.display = 'flex';
            progressFill.style.width = '0%';
            progressText.textContent = '0%';

            const canvas = document.createElement('canvas');
            canvas.width = 1080;
            canvas.height = 1350;
            const ctx = canvas.getContext('2d');

            const rootStyle = getComputedStyle(document.documentElement);
            const accent = rootStyle.getPropertyValue('--accent').trim();
            const overlayVal = parseInt(overlayInput.value) || 70;
            const fontFamily = fontFamilySelect.value;
            const fontWeight = fontWeightSelect.value;
            const fontSize = fontSizeInput.value;
            const lineHeight = lineHeightInput.value;
            const headlineText = headlineInput.value.toUpperCase();
            const isRU = frameSelect.value === 'spectrmind-ru';

            const logoImg = new Image();
            logoImg.src = LOGO_BASE64;

            const bubbleSrc = (bubbleImg.src && bubbleImg.style.display !== 'none') ? bubbleImg.src : null;
            const bubbleImage = bubbleSrc ? new Image() : null;
            if (bubbleImage) bubbleImage.src = bubbleSrc;

            function wrapText(ctx, text, maxWidth, fontSize) {
                const words = text.split(' ');
                const lines = [];
                let currentLine = '';
                ctx.font = `${fontWeight} ${fontSize}px ${fontFamily}`;
                for (const word of words) {
                    const testLine = currentLine ? currentLine + ' ' + word : word;
                    const metrics = ctx.measureText(testLine);
                    if (metrics.width > maxWidth && currentLine) {
                        lines.push(currentLine);
                        currentLine = word;
                    } else {
                        currentLine = testLine;
                    }
                }
                if (currentLine) lines.push(currentLine);
                return lines;
            }

            function drawFrame() {
                ctx.clearRect(0, 0, 1080, 1350);

                if (bgVideo.readyState >= 2) {
                    const vw = bgVideo.videoWidth;
                    const vh = bgVideo.videoHeight;
                    const scale = Math.max(1080 / vw, 1350 / vh);
                    const sw = vw * scale;
                    const sh = vh * scale;
                    ctx.drawImage(bgVideo, (1080 - sw) / 2, (1350 - sh) / 2, sw, sh);
                } else {
                    ctx.fillStyle = '#0A0A0A';
                    ctx.fillRect(0, 0, 1080, 1350);
                }

                const grad = ctx.createLinearGradient(0, 0, 0, 1350);
                grad.addColorStop(0, 'rgba(0,0,0,0)');
                grad.addColorStop(1, `rgba(0,0,0,${overlayVal / 100})`);
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, 1080, 1350);

                if (logoImg.complete) {
                    const lw = 42, lh = 42;
                    ctx.fillStyle = '#0A0A0A';
                    ctx.beginPath();
                    ctx.roundRect(80, 60, lw, lh, 8);
                    ctx.fill();
                    ctx.drawImage(logoImg, 83, 63, lw - 6, lh - 6);
                }

                ctx.font = `900 28px 'Inter', sans-serif`;
                if (isRU) {
                    ctx.fillStyle = accent;
                    ctx.fillText('SpectrMind.ru', 132, 90);
                } else {
                    ctx.fillStyle = '#fff';
                    ctx.fillText('SPECTR', 132, 90);
                    const sw = ctx.measureText('SPECTR').width;
                    ctx.fillStyle = '#00d4ff';
                    ctx.fillText('MIND', 132 + sw + 4, 90);
                }

                ctx.font = `700 16px 'Inter', sans-serif`;
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.fillText(isRU ? '\u0415\u0436\u0435\u0434\u043d\u0435\u0432\u043d\u044b\u0439 \u0438\u043d\u0441\u0430\u0439\u0442' : 'Daily Intelligence', 132, 115);

                if (bubbleImage && bubbleImage.complete) {
                    const cx = 540, cy = 320, cr = 140;
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(cx, cy, cr, 0, Math.PI * 2);
                    ctx.closePath();
                    ctx.clip();
                    ctx.drawImage(bubbleImage, cx - cr, cy - cr, cr * 2, cr * 2);
                    ctx.restore();
                    ctx.beginPath();
                    ctx.arc(cx, cy, cr, 0, Math.PI * 2);
                    ctx.strokeStyle = accent.replace(')', ',0.3)').replace('rgb', 'rgba');
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }

                const maxTextWidth = 920;
                const textLines = wrapText(ctx, headlineText, maxTextWidth, parseInt(fontSize));
                const lh = parseInt(fontSize) * parseFloat(lineHeight);
                const totalTextHeight = textLines.length * lh;
                const textStartY = 1350 - 120 - totalTextHeight;

                textLines.forEach((line, i) => {
                    ctx.font = `${fontWeight} ${fontSize}px ${fontFamily}`;
                    ctx.fillStyle = '#fff';
                    ctx.shadowColor = 'rgba(0,0,0,0.9)';
                    ctx.shadowBlur = 30;
                    ctx.shadowOffsetX = 0;
                    ctx.shadowOffsetY = 5;
                    ctx.fillText(line, 80, textStartY + i * lh + parseInt(fontSize));
                    ctx.shadowColor = 'transparent';
                });

                const by = 1350 - 40;
                ctx.fillStyle = `rgba(${hexToRgb(accent).replace(/,\s*/g, ',')},0.3)`;
                ctx.fillRect(80, by, (1080 - 160 - 200) / 2, 2);
                ctx.fillRect(1080 - 80 - (1080 - 160 - 200) / 2, by, (1080 - 160 - 200) / 2, 2);

                if (logoImg.complete) {
                    ctx.fillStyle = '#0A0A0A';
                    ctx.beginPath();
                    ctx.roundRect(80 + (1080 - 160 - 200) / 2 + 100 - 21, by - 21, 42, 42, 8);
                    ctx.fill();
                    ctx.drawImage(logoImg, 80 + (1080 - 160 - 200) / 2 + 100 - 18, by - 18, 36, 36);
                }

                ctx.font = `900 16px 'Inter', sans-serif`;
                if (isRU) {
                    ctx.fillStyle = accent;
                    const txtW = ctx.measureText('SpectrMind.ru').width;
                    ctx.fillText('SpectrMind.ru', 1080 / 2 - txtW / 2, by + 10);
                } else {
                    const totalW = ctx.measureText('SPECTR').width + 4 + ctx.measureText('Mind').width;
                    const startX = 1080 / 2 - totalW / 2;
                    ctx.fillStyle = '#fff';
                    ctx.fillText('SPECTR', startX, by + 10);
                    const sW = ctx.measureText('SPECTR').width;
                    ctx.fillStyle = accent;
                    ctx.fillText('Mind', startX + sW + 4, by + 10);
                }
            }

            let animFrame;
            const stream = canvas.captureStream(30);
            const chunks = [];
            const recorder = new MediaRecorder(stream, {
                mimeType: 'video/webm;codecs=vp9',
                videoBitsPerSecond: 8000000
            });

            recorder.ondataavailable = (e) => {
                if (e.data.size > 0) chunks.push(e.data);
            };

            recorder.onstop = () => {
                cancelAnimationFrame(animFrame);
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = `spectr-${frameSelect.value}-video-${Date.now()}.webm`;
                link.href = url;
                link.click();
                URL.revokeObjectURL(url);
                exportBtn.innerText = "Download 1080x1350";
                exportBtn.disabled = false;
                exportProgress.style.display = 'none';
            };

            const duration = bgVideo.duration || 30;
            const startTime = performance.now();

            function animate() {
                const elapsed = (performance.now() - startTime) / 1000;
                const progress = Math.min(elapsed / duration, 1);
                progressFill.style.width = (progress * 100) + '%';
                progressText.textContent = Math.round(progress * 100) + '%';
                drawFrame();
                if (progress < 1) {
                    animFrame = requestAnimationFrame(animate);
                } else {
                    recorder.stop();
                }
            }

            bgVideo.currentTime = 0;
            bgVideo.play();
            recorder.start();
            animate();
        }

        exportBtn.addEventListener('click', () => {
            if (currentBgType === 'video' && bgVideo.src) {
                exportVideo();
            } else {
                exportImage();
            }
        });
    </script>

</body>

</html>
