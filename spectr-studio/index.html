<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectr Studio | Content Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Outfit:wght@400;700;900&display=swap"
        rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- Controls Sidebar -->
        <aside class="controls">
            <div class="brand">
                <div class="logo-icon-main"
                    style="width: 38px; height: 38px; background: #0A0A0A; border-radius: 8px; overflow: hidden; margin-right: 8px; padding: 3px; display: inline-block; vertical-align: middle;">
                    <img class="logo-img-src" style="width: 100%; height: 100%; object-fit: contain; display: block;" alt="S">
                </div>
                <h2>Spectr Studio</h2>
            </div>

            <div class="control-group">
                <label>Design variation</label>
                <select id="designSelect">
                    <option value="template-classic">Classic News</option>
                    <option value="template-insight">Insight Quote</option>
                    <option value="template-minimal">Minimalist</option>
                    <option value="template-breaking">Breaking Alert</option>
                </select>
            </div>

            <div class="control-group">
                <label>Accent Color</label>
                <input type="color" id="accentColorInput" value="#00FFFF">
            </div>

            <div class="control-group">
                <label>Headline Font</label>
                <div style="display: flex; gap: 8px;">
                    <select id="fontFamilySelect" style="flex: 1;">
                        <option value="'Inter', sans-serif">Inter</option>
                        <option value="'Outfit', sans-serif">Outfit</option>
                    </select>
                    <select id="fontWeightSelect" style="flex: 1;">
                        <option value="400">Regular</option>
                        <option value="600">Semi Bold</option>
                        <option value="700">Bold</option>
                        <option value="800">Extra Bold</option>
                        <option value="900" selected>Black</option>
                    </select>
                </div>
            </div>

            <div class="control-group">
                <label>Headline Text</label>
                <textarea id="headlineInput"
                    placeholder="Enter news headline...">JPMORGAN ANALYSTS CAME UP WITH A LIST OF 19 STOCKS TO BE "AI-RESISTANT"</textarea>
            </div>

            <div class="control-group">
                <label>Background Image</label>
                <input type="file" id="bgUpload" accept="image/*">
                <p class="hint">Recommended: High quality portrait/dark image</p>
            </div>

            <div class="control-group">
                <label>Bubble Image (Optional)</label>
                <input type="file" id="bubbleUpload" accept="image/*">
            </div>

            <div class="control-group">
                <label>Text Size</label>
                <div class="slider-row">
                    <input type="range" id="fontSizeInput" min="40" max="150" value="80">
                    <span id="fontSizeVal">80px</span>
                </div>
            </div>

            <div class="control-group">
                <label>Line Spacing</label>
                <div class="slider-row">
                    <input type="range" id="lineHeightInput" min="0.8" max="1.5" step="0.05" value="1.05">
                    <span id="lineHeightVal">1.05</span>
                </div>
            </div>

            <div class="control-group">
                <label>Overlay Intensity</label>
                <div class="slider-row">
                    <input type="range" id="overlayInput" min="0" max="100" value="70">
                    <span id="overlayVal">70%</span>
                </div>
            </div>

            <button id="exportBtn" class="primary-btn">Download 1080x1350</button>
            <p class="status">v1.1 Advanced Design Enabled</p>
        </aside>

        <!-- Preview Area -->
        <main class="preview-area">
            <div id="exportWrapper" class="export-wrapper">
                <div id="captureArea" class="post-template template-classic">
                    <!-- Background -->
                    <div id="bgImage" class="bg-layer"></div>
                    <div id="gradientOverlay" class="gradient-overlay"></div>

                    <!-- Header Label -->
                    <div class="top-nav">
                        <div class="nav-left">
                            <div class="brand-logo-main">
                                <div class="logo-icon-main"
                                    style="width: 42px; height: 42px; background: #0A0A0A; border-radius: 8px; overflow: hidden; margin-right: 4px; padding: 3px; display: inline-block; vertical-align: middle;">
                                    <img class="logo-img-src"
                                        style="width: 100%; height: 100%; object-fit: contain; display: block;" alt="S">
                                </div>
                                <span class="word-spectr">SPECTR</span>
                                <span class="word-trading">Trading</span>
                            </div>
                            <span class="series">Daily Intelligence</span>
                        </div>
                    </div>

                    <!-- Bubble -->
                    <div id="bubbleCircle" class="logo-bubble">
                        <div id="bubbleContent" class="bubble-inner">
                            <img id="bubbleImg" src="" style="display: none;">
                            <span id="bubblePlaceholderText">LOGO</span>
                        </div>
                    </div>

                    <!-- Headline -->
                    <div class="headline-container">
                        <h1 id="headlineDisplay">JPMORGAN ANALYSTS CAME UP WITH A LIST OF 19 STOCKS TO BE "AI-RESISTANT"
                        </h1>
                    </div>

                    <!-- Bottom Branding -->
                    <div class="bottom-brand">
                        <div class="brand-line"></div>
                        <div class="brand-logo-small">
                            <div class="logo-icon-main"
                                style="width: 42px; height: 42px; background: #0A0A0A; border-radius: 8px; overflow: hidden; margin-right: 4px; padding: 3px; display: inline-block; vertical-align: middle;">
                                <img class="logo-img-src" style="width: 100%; height: 100%; object-fit: contain; display: block;"
                                    alt="S">
                            </div>
                            <span class="word-spectr">SPECTR</span>
                            <span class="word-trading">Trading</span>
                        </div>
                        <div class="brand-line"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

        const headlineInput = document.getElementById('headlineInput');
        const headlineDisplay = document.getElementById('headlineDisplay');
        const bgUpload = document.getElementById('bgUpload');
        const bgImage = document.getElementById('bgImage');
        const bubbleUpload = document.getElementById('bubbleUpload');
        const bubbleCircle = document.getElementById('bubbleCircle');
        const bubbleImg = document.getElementById('bubbleImg');
        const bubblePlaceholderText = document.getElementById('bubblePlaceholderText');

        const fontSizeInput = document.getElementById('fontSizeInput');
        const fontSizeVal = document.getElementById('fontSizeVal');
        const lineHeightInput = document.getElementById('lineHeightInput');
        const lineHeightVal = document.getElementById('lineHeightVal');
        const overlayInput = document.getElementById('overlayInput');
        const overlayVal = document.getElementById('overlayVal');

        const accentColorInput = document.getElementById('accentColorInput');
        const designSelect = document.getElementById('designSelect');
        const fontFamilySelect = document.getElementById('fontFamilySelect');
        const fontWeightSelect = document.getElementById('fontWeightSelect');

        const gradientOverlay = document.getElementById('gradientOverlay');
        const exportBtn = document.getElementById('exportBtn');
        const captureArea = document.getElementById('captureArea');

        // Initialize all logo images with the Base64 string
        function initLogos() {
            document.querySelectorAll('.logo-img-src').forEach(img => {
                img.src = LOGO_BASE64;
            });
        }
        initLogos();

        // Helper to convert hex to rgb for CSS variables
        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `${r}, ${g}, ${b}`;
        }

        // Color Change
        accentColorInput.addEventListener('input', () => {
            const color = accentColorInput.value;
            const rgb = hexToRgb(color);
            document.documentElement.style.setProperty('--accent', color);
            document.documentElement.style.setProperty('--accent-rgb', rgb);
        });

        // Design Change
        designSelect.addEventListener('change', () => {
            const templates = ['template-classic', 'template-insight', 'template-minimal', 'template-breaking'];
            templates.forEach(t => captureArea.classList.remove(t));
            captureArea.classList.add(designSelect.value);
        });

        // Font Change
        fontFamilySelect.addEventListener('change', () => {
            headlineDisplay.style.fontFamily = fontFamilySelect.value;
        });

        fontWeightSelect.addEventListener('change', () => {
            headlineDisplay.style.fontWeight = fontWeightSelect.value;
        });

        // Text Sync
        headlineInput.addEventListener('input', () => {
            headlineDisplay.innerText = headlineInput.value.toUpperCase();
        });

        // Font Size Sync
        fontSizeInput.addEventListener('input', () => {
            headlineDisplay.style.fontSize = fontSizeInput.value + 'px';
            fontSizeVal.innerText = fontSizeInput.value + 'px';
        });

        // Line Height Sync
        lineHeightInput.addEventListener('input', () => {
            headlineDisplay.style.lineHeight = lineHeightInput.value;
            lineHeightVal.innerText = lineHeightInput.value;
        });

        // Overlay Sync
        overlayInput.addEventListener('input', () => {
            const val = overlayInput.value;
            gradientOverlay.style.background = `linear-gradient(to bottom, transparent 0%, rgba(0,0,0,${val / 100}) 100%)`;
            overlayVal.innerText = val + '%';
        });

        // BG Upload
        bgUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (f) => {
                    bgImage.style.backgroundImage = `url('${f.target.result}')`;
                };
                reader.readAsDataURL(file);
            }
        });

        // Bubble Upload
        bubbleUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (f) => {
                    bubbleImg.src = f.target.result;
                    bubbleImg.style.display = 'block';
                    bubbleCircle.style.display = 'block';
                    bubblePlaceholderText.style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        });

        // Export Function
        exportBtn.addEventListener('click', () => {
            exportBtn.innerText = "Processing...";
            exportBtn.disabled = true;

            // Create a clone
            const clone = captureArea.cloneNode(true);

            // Important: also clone the style overrides from the root if any applied via JS
            const rootStyle = getComputedStyle(document.documentElement);
            const accent = rootStyle.getPropertyValue('--accent');
            const accentRgb = rootStyle.getPropertyValue('--accent-rgb');

            Object.assign(clone.style, {
                position: 'fixed',
                top: '0',
                left: '200%', // Way off screen
                width: '1080px',
                height: '1350px',
                transform: 'none',
                visibility: 'visible',
                zIndex: '99999',
                // Explicitly pass variables to clone
                '--accent': accent,
                '--accent-rgb': accentRgb
            });

            document.body.appendChild(clone);

            // Re-apply critical styles to clone
            const bgElement = clone.querySelector('.bg-layer');
            const originalBg = bgImage.style.backgroundImage;
            if (originalBg) bgElement.style.backgroundImage = originalBg;

            // Re-apply overlay gradient manually if needed
            const cloneOverlay = clone.querySelector('.gradient-overlay');
            cloneOverlay.style.background = gradientOverlay.style.background;

            // Re-apply headline styles
            const cloneHeadline = clone.querySelector('#headlineDisplay');
            cloneHeadline.style.fontSize = headlineDisplay.style.fontSize;
            cloneHeadline.style.lineHeight = headlineDisplay.style.lineHeight;
            cloneHeadline.style.fontFamily = headlineDisplay.style.fontFamily || "'Inter', sans-serif";
            cloneHeadline.style.fontWeight = headlineDisplay.style.fontWeight || "900";

            // Re-apply base64 logos
            const cloneLogos = clone.querySelectorAll('.logo-img-src');
            cloneLogos.forEach((img) => {
                img.src = LOGO_BASE64;
            });

            // Re-apply bubble image
            const cloneBubbleCircle = clone.querySelector('#bubbleCircle');
            const cloneBubbleImg = clone.querySelector('#bubbleImg');
            if (bubbleImg.src && bubbleImg.style.display !== 'none') {
                cloneBubbleImg.src = bubbleImg.src;
                cloneBubbleImg.style.display = 'block';
                cloneBubbleCircle.style.display = 'block';
            } else {
                cloneBubbleCircle.style.display = 'none';
            }

            // Force layout
            const h = clone.offsetHeight;

            setTimeout(() => {
                html2canvas(clone, {
                    scale: 2,
                    useCORS: true,
                    allowTaint: false,
                    backgroundColor: '#000',
                    width: 1080,
                    height: 1350
                }).then(canvas => {
                    try {
                        const link = document.createElement('a');
                        link.download = `spectr-news-${designSelect.value}-${Date.now()}.png`;
                        link.href = canvas.toDataURL('image/png', 1.0);
                        link.click();
                    } catch (e) {
                        console.error("toDataURL failed:", e);
                        alert("Security error: Could not save image. Try using a different browser or checking image permissions.");
                    }

                    document.body.removeChild(clone);
                    exportBtn.innerText = "Download 1080x1350";
                    exportBtn.disabled = false;
                }).catch(err => {
                    console.error("Export Error:", err);
                    if (clone.parentNode) document.body.removeChild(clone);
                    alert("Export failed: " + err.message);
                    exportBtn.innerText = "Download 1080x1350";
                    exportBtn.disabled = false;
                });
            }, 300);
        });
    </script>
